    <script>
        // --- MATRIX BACKGROUND ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let matrixInterval;
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        const letters = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ$#@%';
        const matrixLetters = letters.split('');
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = matrixLetters[Math.floor(Math.random() * matrixLetters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        function startMatrix() { matrixInterval = setInterval(drawMatrix, 30); }
        startMatrix();

        // --- DVD TEXT ---
        const textElement = document.getElementById('dvd-text');
        let posX = Math.random() * (window.innerWidth - 300);
        let posY = Math.random() * (window.innerHeight - 200);
        let speedX = 4;
        let speedY = 4;
        const colors = ['#00ff00', '#ff00ff', '#00ffff', '#ffff00', '#ff0000', '#0000ff', '#ffffff'];
        function moveText() {
            posX += speedX; posY += speedY;
            const textWidth = textElement.offsetWidth;
            const textHeight = textElement.offsetHeight;
            if (posX <= 0 || posX + textWidth >= window.innerWidth) { speedX = -speedX; changeColor(); }
            if (posY <= 0 || posY + textHeight >= window.innerHeight) { speedY = -speedY; changeColor(); }
            textElement.style.left = posX + 'px'; textElement.style.top = posY + 'px';
            requestAnimationFrame(moveText);
        }
        function changeColor() { textElement.style.color = colors[Math.floor(Math.random() * colors.length)]; }
        moveText();

        // --- BOTÃO QUE FOGE + TELA AZUL CORRIGIDA ---
        const button = document.getElementById('flee-button');
        let annoyCount = 0;
        let bsodActive = false;
        let typedText = "";

        function triggerBSOD() {
            bsodActive = true;
            typedText = "";
            document.getElementById('typed-command').innerText = "";
            document.getElementById('blue-screen').style.display = 'block';
            document.getElementById('bg-audio').pause();
            clearInterval(matrixInterval);
        }

        function recoverFromBSOD() {
            bsodActive = false;
            annoyCount = 0;
            document.getElementById('blue-screen').style.display = 'none';
            document.getElementById('bg-audio').play();
            startMatrix();
            button.style.position = 'absolute';
            button.style.left = 'auto';
            button.style.top = 'auto';
            button.style.zIndex = '10';
        }

        button.addEventListener('mouseover', () => {
            if(bsodActive) return;
            annoyCount++;
            
            if (annoyCount >= 5) { 
                triggerBSOD(); 
                return; 
            }
            
            // CORREÇÃO: Garante que o botão fique visível na tela e por cima do Matrix
            button.style.position = 'fixed'; 
            button.style.zIndex = '99999';

            // Calcula limites seguros para o botão não sumir para fora das bordas da página
            const maxW = window.innerWidth - button.offsetWidth - 20;
            const maxH = window.innerHeight - button.offsetHeight - 20;
            
            const newX = Math.max(10, Math.random() * maxW);
            const newY = Math.max(10, Math.random() * maxH);
            
            button.style.left = newX + 'px'; 
            button.style.top = newY + 'px';
        });

        button.addEventListener('click', triggerBSOD);

        // --- ESCUTA O TECLADO NA TELA AZUL ---
        window.addEventListener('keydown', (e) => {
            if (!bsodActive) return;

            if (e.key.length === 1) {
                typedText += e.key;
            } else if (e.key === 'Backspace') {
                typedText = typedText.slice(0, -1);
            }

            document.getElementById('typed-command').innerText = typedText;

            if (typedText === 'hello world') {
                recoverFromBSOD();
            }
        });

        setInterval(() => {
            const cursor = document.getElementById('cursor');
            cursor.style.opacity = cursor.style.opacity === '0' ? '1' : '0';
        }, 500);
    </script>
