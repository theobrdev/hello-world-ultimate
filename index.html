<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World Neo Edition 95</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #dvd-text {
            position: absolute;
            font-size: 50px;
            font-weight: bold;
            white-space: nowrap;
            user-select: none;
            z-index: 5;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
        }

        .ui-container {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        #flee-button {
            position: absolute;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #ff0055;
            color: white;
            border: 3px solid white;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.05s ease;
            box-shadow: 0px 0px 15px rgba(255, 0, 85, 0.7);
            z-index: 15;
        }

        .counter-box {
            border: 2px dashed #00ff00;
            padding: 5px 15px;
            background: rgba(17, 17, 17, 0.9);
            font-size: 14px;
        }
        .counter-number {
            color: #ffcc00;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* CONTAINER DO RICKROLL */
        #rickroll-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background-color: #000000;
        }
        #rickroll-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* CAMADA INVISÍVEL PARA FORÇAR INTERAÇÃO */
        #click-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 999;
            background: transparent;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <script>
        alert("Sua mente está prestes a ser hackeada.\nDeseja entrar na Matrix?");
    </script>

    <!-- Camada invisível que captura o primeiro clique do usuário -->
    <div id="click-overlay"></div>

    <canvas id="matrix-canvas"></canvas>
    <div id="dvd-text">hello world</div>

    <div class="ui-container">
        <audio id="bg-audio" autoplay loop controls style="opacity: 0.5; height: 30px;">
            <source src="videoplayback.mp3" type="audio/mpeg">
            Seu navegador não suporta áudio.
        </audio>

        <div class="counter-box">
            VISITANTE NÚMERO: <span class="counter-number">999.874.123</span>
        </div>

        <div style="height: 60px; position: relative; width: 300px;">
            <button id="flee-button">DESTRUIR A INTERNET</button>
        </div>
    </div>

    <!-- VÍDEO COMPATÍVEL COM AS REGRAS DO FIREFOX -->
    <div id="rickroll-container">
        <video id="rickroll-video" loop>
            <source src="rickroll.mp4" type="video/mp4">
            Seu navegador não suporta vídeo.
        </video>
    </div>

    <script>
        // --- MATRIX BACKGROUND ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let matrixInterval;
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        const letters = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ$#@%';
        const matrixLetters = letters.split('');
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = matrixLetters[Math.floor(Math.random() * matrixLetters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        function startMatrix() { matrixInterval = setInterval(drawMatrix, 30); }
        startMatrix();

        // --- DVD TEXT ---
        const textElement = document.getElementById('dvd-text');
        let posX = Math.random() * (window.innerWidth - 300);
        let posY = Math.random() * (window.innerHeight - 200);
        let speedX = 4;
        let speedY = 4;
        const colors = ['#00ff00', '#ff00ff', '#00ffff', '#ffff00', '#ff0000', '#0000ff', '#ffffff'];
        function moveText() {
            posX += speedX; posY += speedY;
            const textWidth = textElement.offsetWidth;
            const textHeight = textElement.offsetHeight;
            if (posX <= 0 || posX + textWidth >= window.innerWidth) { speedX = -speedX; changeColor(); }
            if (posY <= 0 || posY + textHeight >= window.innerHeight) { speedY = -speedY; changeColor(); }
            textElement.style.left = posX + 'px'; textElement.style.top = posY + 'px';
            requestAnimationFrame(moveText);
        }
        function changeColor() { textElement.style.color = colors[Math.floor(Math.random() * colors.length)]; }
        moveText();

        // --- CONTROLE DE INTERAÇÃO DO USUÁRIO ---
        let userInteracted = false;
        const overlay = document.getElementById('click-overlay');
        const bgAudio = document.getElementById('bg-audio');

        overlay.addEventListener('click', () => {
            userInteracted = true;
            overlay.style.display = 'none'; // Some com a camada para liberar os botões embaixo
            if(bgAudio) bgAudio.play(); // Garante o início do Sparta Remix com som
        });

        // --- GATILHO DEFINITIVO ANTI-PAUSA ---
        const button = document.getElementById('flee-button');

        function startRickroll() {
            if(bgAudio) bgAudio.pause();
            clearInterval(matrixInterval);

            const container = document.getElementById('rickroll-container');
            const rickVideo = document.getElementById('rickroll-video');
            
            if(container && rickVideo) {
                container.style.display = 'block';
                
                // Como houve o clique na janela, o Firefox dá permissão total sem pausar o player
                rickVideo.play().catch(error => {
                    console.log("Falha na reprodução direta, rodando em modo de segurança:", error);
                    rickVideo.muted = true;
                    rickVideo.play();
                });
            }
        }

        button.addEventListener('mouseover', startRickroll);
        button.addEventListener('click', startRickroll);
    </script>
</body>
</html>
